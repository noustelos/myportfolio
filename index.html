<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebHostPro | High-End Artisanal Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,500&family=Inter:wght@300;400;600&family=Italianno&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #C3CDBA; /* Muted Sage */
  --text: #111;
  --muted: #5E6B4E;
  --frame-bg: #FAF9F6;
  --accent: #B28B67;
}

/* Κλείδωμα Scroll */
html, body {
  margin: 0;
  padding: 0;
  height: 100vh;
  width: 100vw;
  overflow: hidden; /* No scroll */
  background: var(--bg);
  display: flex;
  flex-direction: column;
}

body {
  font-family: 'Inter', sans-serif;
  color: var(--text);
}

/* Header - Προσαρμοσμένο ύψος */
header {
  height: 25vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding-top: 20px;
}

h1 {
  font-family: 'Italianno', cursive;
  font-size: clamp(60px, 8vw, 110px);
  color: #FFFFFF !important;
  font-weight: 400;
  line-height: 0.6;
  margin-bottom: 10px;
}

.partnership { margin-top: 10px; }
.script {
  font-family: 'Cormorant+Garamond', serif;
  font-style: italic;
  font-size: clamp(18px, 2vw, 24px);
  color: rgba(255,255,255,0.8);
}
.brand {
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text);
  margin-left: 10px;
}

/* Projects Section - Καταλαμβάνει το κέντρο */
.projects-container {
  height: 60vh;
  display: flex;
  align-items: center;
  padding: 0 5%;
}

.projects {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 30px;
  width: 100%;
}

.card { text-decoration: none; color: inherit; transition: transform 0.4s ease; }

.frame {
  background: var(--frame-bg);
  padding: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
  position: relative;
}

.image-wrapper { aspect-ratio: 3 / 2; overflow: hidden; }
.image-wrapper img { width: 100%; height: 100%; object-fit: cover; }

.project-title { font-size: 13px; font-weight: 600; margin-top: 12px; }
.project-meta { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

/* Glow effect */
.card:hover { transform: translateY(-8px); }
.card:hover .frame::after {
  content: "";
  position: absolute;
  inset: -25px;
  background: radial-gradient(circle, rgba(178,139,103,0.15) 0%, transparent 70%);
  z-index: -1;
  filter: blur(30px);
}

/* FOOTER - Το "Classy" κλείσιμο */
footer {
  height: 15vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.footer-text {
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  font-size: 11px;
  letter-spacing: 8px; /* ΠολύClassy look */
  text-transform: uppercase;
  color: #FFFFFF; /* Τέλεια αντίθεση με το Sage */
  opacity: 0.9;
}

@media(max-width: 1000px) {
  .projects { grid-template-columns: repeat(2, 1fr); gap: 20px; }
  html, body { overflow: auto; height: auto; } /* Scroll μόνο σε κινητά */
}
</style>
</head>
<body>

<header>
  <h1>Work in Progress</h1>
  <div class="partnership">
    <span class="script">in partnership with</span>
    <span class="brand">WebHostPro Co.</span>
  </div>
</header>

<div class="projects-container">
  <section class="projects">
    <a href="https://noustelos.github.io/WebHostPro_SITE/" target="_blank" class="card">
      <div class="frame">
        <div class="image-wrapper"><img src="assets/project1.jpeg" alt="P1">></div>
        <div class="caption"><div class="project-title">Main Site Intro</div><div class="project-meta">Branding</div></div>
      </div>
    </a>
    <a href="https://noustelos.github.io/911_asthenofora/" target="_blank" class="card">
      <div class="frame">
        <div class="image-wrapper"><img src="assets/project2.jpeg" alt="P1"></div>
        <div class="caption"><div class="project-title">911 Asthenofora</div><div class="project-meta">SEO</div></div>
      </div>
    </a>
    <a href="https://365orthodoxy.com/" target="_blank" class="card">
      <div class="frame">
        <div class="image-wrapper"><img src="assets/project3.jpeg" alt="P1"></div>
        <div class="caption"><div class="project-title">365 Orthodoxy</div><div class="project-meta">Widget</div></div>
      </div>
    </a>
    <a href="https://noustelos.github.io/timoni-Zois/" target="_blank" class="card">
      <div class="frame">
        <div class="image-wrapper"><img src="assets/project1.jpeg" alt="P1"></div>
        <div class="caption"><div class="project-title">Timoni Zois</div><div class="project-meta">Redesign</div></div>
      </div>
    </a>
  </section>
</div>

<footer>
  <div class="footer-text">spiritual inspiration through design</div>
</footer>

</body>
</html>
